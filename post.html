<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DietOn - 게시글 상세보기</title>
  <link rel="stylesheet" href="css/style.css?v=20260622_1940">
</head>
<body data-page="post">
  <header class="site-header" id="siteHeader"></header>
  <div class="header-spacer"></div>

  <main class="page-shell">
    <div class="content-layout">
      <section class="main-column">
        <article class="post-detail" id="postDetail"></article>
        <section class="board-section">
          <div class="section-head">
            <h2>댓글 <span id="commentCount">0</span></h2>
          </div>
          <div class="comment-list" id="commentList"></div>
          <form class="comment-form" id="commentForm">
            <input id="commentInput" type="text" placeholder="응원이나 조언을 남겨주세요" required>
            <button class="btn primary" type="submit">등록</button>
          </form>
        </section>
      </section>
      <aside class="side-column" id="sidebar"></aside>
    </div>
  </main>

  <script src="js/managers/StorageManager.js?v=20260622_1940"></script>
  <script src="js/managers/PointManager.js?v=20260622_1940"></script>
  <script src="js/managers/UIManager.js?v=20260622_1940"></script>
  <script src="js/app.js?v=20260622_1940"></script>
</body>
</html>
