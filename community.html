<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DietOn - 다이어트 이야기</title>
  <link rel="stylesheet" href="css/style.css?v=20260622_2000">
</head>
<body data-page="community">
  <header class="site-header" id="siteHeader"></header>
  <div class="header-spacer"></div>

  <main class="page-shell">
    <div class="content-layout">
      <section class="main-column">
        <section class="write-panel" id="writePanel" hidden>
          <div class="section-head dark">
            <h2>새 글 작성</h2>
            <button class="btn secondary" data-action="toggle-write">닫기</button>
          </div>
          <form class="write-form" id="postForm">
            <select id="postTag" required>
              <option value="general">자유수다</option>
              <option value="meal">식단인증</option>
              <option value="review">비포&애프터</option>
              <option value="treatment">비만치료 후기</option>
              <option value="side_effect">요요/부작용 Q&A</option>
            </select>
            <input id="postTitle" type="text" placeholder="제목을 입력하세요" required>
            <textarea id="postContent" rows="6" placeholder="내용을 입력하세요" required></textarea>
            <button class="btn primary" type="submit">글 등록</button>
          </form>
        </section>

        <section class="filter-panel">
          <div class="filter-tabs" id="filterTabs"></div>
          <button class="btn primary" data-action="toggle-write">글쓰기</button>
        </section>

        <section class="post-list" id="postList"></section>
      </section>
      <aside class="side-column" id="sidebar"></aside>
    </div>
  </main>

  <script src="js/managers/StorageManager.js?v=20260622_2000"></script>
  <script src="js/managers/PointManager.js?v=20260622_2000"></script>
  <script src="js/managers/UIManager.js?v=20260622_2000"></script>
  <script src="js/app.js?v=20260622_2000"></script>
</body>
</html>
