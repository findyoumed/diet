<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DietOn - 체중 & 식단 기록</title>
  <link rel="stylesheet" href="css/style.css?v=20260622_1940">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-page="record">
  <header class="site-header" id="siteHeader"></header>
  <div class="header-spacer"></div>

  <main class="page-shell">
    <div class="content-layout">
      <section class="main-column">
        <section class="board-section">
          <div class="section-head">
            <h2>오늘의 체중 & 복약 체크</h2>
          </div>
          <form class="record-form" id="healthForm">
            <label>오늘 체중(kg)<input id="inputWeight" type="number" step="0.1" placeholder="70.5" required></label>
            <label class="check-row"><input id="inputMedicine" type="checkbox"> 오늘 비만치료제 또는 보조제 복용 완료</label>
            <button class="btn primary" type="submit">기록 저장</button>
          </form>
        </section>

        <section class="board-section">
          <div class="section-head">
            <h2>식단 다이어리</h2>
          </div>
          <form class="meal-form" id="mealForm">
            <select id="mealType">
              <option value="breakfast">아침</option>
              <option value="lunch">점심</option>
              <option value="dinner">저녁</option>
              <option value="snack">간식</option>
            </select>
            <input id="foodName" type="text" placeholder="음식명" required>
            <input id="foodCalories" type="number" placeholder="kcal" required>
            <button class="btn primary" type="submit">추가</button>
          </form>
          <div class="meal-list" id="mealList"></div>
        </section>

        <section class="chart-grid">
          <div class="board-section chart-card">
            <div class="section-head"><h2>30일 몸무게 추이</h2></div>
            <canvas id="weightChart"></canvas>
          </div>
          <div class="board-section chart-card">
            <div class="section-head"><h2>오늘 칼로리 구성</h2></div>
            <canvas id="calorieChart"></canvas>
          </div>
        </section>
      </section>
      <aside class="side-column" id="sidebar"></aside>
    </div>
  </main>

  <script src="js/managers/StorageManager.js?v=20260622_1940"></script>
  <script src="js/managers/PointManager.js?v=20260622_1940"></script>
  <script src="js/managers/UIManager.js?v=20260622_1940"></script>
  <script src="js/app.js?v=20260622_1940"></script>
</body>
</html>
